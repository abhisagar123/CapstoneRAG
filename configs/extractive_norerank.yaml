# Experiment 6D: extractive prompt (stick to source wording) + NO reranker.
# Pair with grounded_norerank.yaml -> isolates the PROMPT's effect on ADHERENCE via a
# different mechanism than grounded_complete: "quote/closely paraphrase the context, don't
# rephrase" (extractive) vs grounded's free-form grounded answer. Hypothesis: staying close
# to source wording cuts the invented phrasings a 3B generator adds -> higher adherence.
# Only `prompt` differs from grounded_norerank.yaml; all else identical.
domain: Legal

chunker:   { type: fixed, size: 512, overlap: 50 }
embedder:  { type: minilm }
index:     { type: faiss, corpus_mode: per_example }

retriever: { type: dense, k: 20 }
reranker:  { type: none, top_n: 5 }
repacker:  { type: reverse }
prompt:    { type: extractive }                       # the one variable vs grounded_norerank.yaml
generator: { type: ollama, model: llama3.1:8b, max_new_tokens: 256 }   # overridden by --gen-model at run time

splitter:  { type: regex }

seed: 42
