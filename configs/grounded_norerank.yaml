# Experiment: grounded prompt + NO reranker.
# Pair with grounded_rerank.yaml -> isolates the RERANKER's effect (Relevance lever).
# Only `reranker` differs from grounded_rerank.yaml; all else identical.
domain: Legal

chunker:   { type: fixed, size: 512, overlap: 50 }
embedder:  { type: minilm }
index:     { type: faiss, corpus_mode: per_example }

retriever: { type: dense, k: 20 }
reranker:  { type: none, top_n: 5 }                   # no re-scoring: just take the retriever's top 5
repacker:  { type: reverse }
prompt:    { type: grounded }
generator: { type: ollama, model: llama3.1:8b, max_new_tokens: 256 }   # local (Ollama); non-Chinese

splitter:  { type: regex }

seed: 42
