# Experiment 4: completeness-aware grounding prompt + NO reranker.
# Pair with grounded_norerank.yaml -> isolates the PROMPT's effect (Adherence/Completeness
# lever). ONLY `prompt` differs from grounded_norerank.yaml (grounded -> grounded_complete);
# everything else is identical, so the gap vs that row at the SAME seed/N is the prompt's doing.
domain: Legal

chunker:   { type: fixed, size: 512, overlap: 50 }
embedder:  { type: minilm }
index:     { type: faiss, corpus_mode: per_example }

retriever: { type: dense, k: 20 }
reranker:  { type: none, top_n: 5 }
repacker:  { type: reverse }
prompt:    { type: grounded_complete }                # the one variable vs grounded_norerank.yaml
generator: { type: ollama, model: llama3.1:8b, max_new_tokens: 256 }   # overridden by --gen-model at run time

splitter:  { type: regex }

seed: 42
