domain: Legal

chunker:   { type: fixed, size: 512, overlap: 50 }
embedder:  { type: minilm }
index:     { type: faiss, corpus_mode: per_example }

retriever: { type: dense, k: 20 }
reranker:  { type: cross_encoder, top_n: 5 }
repacker:  { type: reverse }
prompt:    { type: minimal_grounded }
generator: { type: ollama, model: llama3.1:8b, max_new_tokens: 256 }

splitter:  { type: regex }

seed: 42